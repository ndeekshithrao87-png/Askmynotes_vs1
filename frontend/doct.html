<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 2.5rem 2rem 2rem;
      position: relative;
    }

    .login-brand {
      margin-bottom: 2rem;
      text-align: center;
    }

    .login-brand .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .login-brand .tagline {
      font-size: 13px;
      font-weight: 300;
      color: #888;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap i {
      position: absolute;
      left: 12px;
      font-size: 16px;
      color: #aaa;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      height: 42px;
      padding: 0 12px 0 38px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      background: #f9f8f6;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap input:focus {
      border-color: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 3px rgba(100,100,200,0.1);
      background: #fff;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #aaa;
      display: flex;
      align-items: center;
      font-size: 16px;
    }
    .toggle-pw:hover { color: #666; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      cursor: pointer;
      text-decoration: none;
    }
    .forgot:hover { color: #1a1a1a; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 1.8rem;
    }

    .btn-cancel {
      flex: 1;
      height: 42px;
      background: none;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #666;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-cancel:hover { background: #f5f4f0; color: #1a1a1a; }

    .btn-signin {
      flex: 2;
      height: 42px;
      background: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-signin:hover { opacity: 0.85; }
    .btn-signin:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.6rem 0 1.2rem;
    }
    .divider span {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(0,0,0,0.1);
    }

    .social-row { display: flex; gap: 8px; }

    .social-btn {
      flex: 1;
      height: 38px;
      background: none;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .social-btn:hover { border-color: rgba(0,0,0,0.25); color: #1a1a1a; background: #f9f8f6; }

    .signup-row {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 13px;
      color: #aaa;
    }
    .signup-row span {
      color: #1a1a1a;
      cursor: pointer;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .toast {
      position: absolute;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div id="toast" class="toast"></div>

    <div class="login-brand">
      <p class="wordmark">Welcome back</p>
      <p class="tagline">Sign in to continue</p>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <i class="ti ti-user"></i>
        <input type="text" id="username" placeholder="your username" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
          <i class="ti ti-eye" id="eyeIcon"></i>
        </button>
      </div>
      <a class="forgot" tabindex="0">Forgot password?</a>
    </div>

    <div class="actions">
      <button class="btn-cancel" id="cancelBtn" type="button">Cancel</button>
      <button class="btn-signin" id="signinBtn" type="button">
        <i class="ti ti-arrow-right"></i>
        Sign in
      </button>
    </div>

    <div class="divider"><span>or continue with</span></div>

    <div class="social-row">
      <button class="social-btn"><i class="ti ti-brand-google"></i> Google</button>
      <button class="social-btn"><i class="ti ti-brand-github"></i> GitHub</button>
    </div>

    <div class="signup-row">
      Don't have an account? <span>Sign up</span>
    </div>
  </div>

  <script>
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    const eyeIcon  = document.getElementById('eyeIcon');

    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeIcon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    document.getElementById('signinBtn').addEventListener('click', () => {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) { showToast('Please fill in all fields'); return; }
      showToast('Signing in…');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      showToast('Cleared');
    });
  </script>

</body>
</html>
